<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Scratch Quest – Truth or Dare</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <style>
        /* ── RESET & ROOT ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg-primary: #0d0d0f;
            --bg-secondary: #1a1a1f;
            --bg-card: #24242b;
            --bg-input: #2c2c35;
            --text-primary: #f0eef2;
            --text-secondary: #b0aeb8;
            --accent: #ff6b8a;
            --accent-hover: #ff4d73;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            --radius: 20px;
            --transition: 0.3s ease;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --truth-color: #4fc3f7;
            --dare-color: #ff8a65;
        }
        body.light {
            --bg-primary: #f5f3f7;
            --bg-secondary: #eae8ed;
            --bg-card: #ffffff;
            --bg-input: #f0eef3;
            --text-primary: #1e1c22;
            --text-secondary: #4a4850;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            --border-subtle: rgba(0, 0, 0, 0.06);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background var(--transition), color var(--transition);
        }

        #app {
            flex: 1;
            padding: 20px 16px 90px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        /* ── FOOTER ── */
        #main-footer {
            background: var(--bg-secondary);
            padding: 14px 20px;
            border-top: 1px solid var(--border-subtle);
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            transition: background var(--transition);
        }
        .footer-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .footer-links a {
            color: var(--text-secondary);
            margin-left: 18px;
            font-size: 1.2rem;
            transition: color var(--transition);
        }
        .footer-links a:hover {
            color: var(--accent);
        }

        /* ── PAGES ── */
        .page {
            display: none;
            animation: fadeUp 0.4s ease;
        }
        .page.active {
            display: block;
        }
        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── BUTTONS ── */
        .btn {
            display: inline-block;
            padding: 12px 28px;
            border: none;
            border-radius: 50px;
            background: var(--accent);
            color: #fff;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background var(--transition), transform 0.15s;
            text-decoration: none;
            box-shadow: 0 4px 14px rgba(255, 107, 138, 0.3);
        }
        .btn:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
        }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            box-shadow: none;
        }
        .btn-outline:hover {
            background: var(--accent);
            color: #fff;
        }
        .btn-sm {
            padding: 8px 16px;
            font-size: 0.85rem;
        }
        .btn-danger {
            background: #e74c3c;
            box-shadow: 0 4px 14px rgba(231, 76, 60, 0.3);
        }
        .btn-danger:hover {
            background: #c0392b;
        }
        .btn-success {
            background: #2ecc71;
            box-shadow: 0 4px 14px rgba(46, 204, 113, 0.3);
        }
        .btn-success:hover {
            background: #27ae60;
        }
        .btn-truth {
            background: var(--truth-color);
            color: #1a1a2e;
            box-shadow: 0 4px 20px rgba(79, 195, 247, 0.4);
        }
        .btn-truth:hover {
            background: #29b6f6;
            transform: scale(1.04);
        }
        .btn-dare {
            background: var(--dare-color);
            color: #1a1a2e;
            box-shadow: 0 4px 20px rgba(255, 138, 101, 0.4);
        }
        .btn-dare:hover {
            background: #ff7043;
            transform: scale(1.04);
        }

        /* ── CARDS ── */
        .card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px 24px;
            box-shadow: var(--shadow);
            transition: background var(--transition), box-shadow var(--transition);
        }
        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .section-title i {
            color: var(--accent);
        }

        /* ── HERO ── */
        .hero {
            text-align: center;
            padding: 40px 0 30px;
        }
        .hero h1 {
            font-size: 2.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #ffb3c6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin: 12px 0 24px;
        }

        /* ── CATEGORY GRID ── */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
            margin: 24px 0 30px;
        }
        .cat-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 24px 16px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition);
            border: 3px solid transparent;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }
        .cat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, transparent 60%, rgba(255, 107, 138, 0.05));
            pointer-events: none;
        }
        .cat-card:hover {
            transform: translateY(-6px) scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
        }
        .cat-card.active {
            border-color: var(--accent);
            background: var(--bg-input);
        }
        .cat-card .cat-icon {
            font-size: 2.4rem;
            margin-bottom: 10px;
            display: block;
            color: var(--accent);
        }
        .cat-card .cat-name {
            font-weight: 600;
            font-size: 1rem;
            display: block;
        }
        .cat-card .cat-count {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 4px;
            display: block;
        }
        .cat-card .cat-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 0.6rem;
            background: var(--accent);
            color: #fff;
            padding: 2px 10px;
            border-radius: 50px;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Special Truth or Dare category card */
        .cat-card.truthdare-card {
            background: linear-gradient(135deg, rgba(79, 195, 247, 0.15), rgba(255, 138, 101, 0.15));
            border-color: var(--truth-color);
        }
        .cat-card.truthdare-card .cat-icon {
            background: linear-gradient(135deg, var(--truth-color), var(--dare-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .cat-card.truthdare-card:hover {
            border-color: var(--dare-color);
        }
        .cat-card.truthdare-card.active {
            border-color: var(--truth-color);
            background: linear-gradient(135deg, rgba(79, 195, 247, 0.25), rgba(255, 138, 101, 0.25));
        }

        .random-section {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
            margin: 20px 0 30px;
        }

        .about-text {
            color: var(--text-secondary);
            line-height: 1.7;
            max-width: 700px;
        }

        /* ── SCRATCH CANVAS ── */
        .scratch-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            padding: 10px 0;
        }
        .canvas-wrapper {
            position: relative;
            width: 100%;
            max-width: 420px;
            aspect-ratio: 1 / 1;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            background: #1e1e26;
        }
        #scratchCanvas {
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
            cursor: pointer;
        }
        .card-info {
            text-align: center;
            width: 100%;
            max-width: 420px;
        }
        .card-title {
            font-size: 1.5rem;
            font-weight: 600;
        }
        .card-category {
            color: var(--accent);
            font-weight: 500;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .revealed-message {
            font-size: 1.2rem;
            margin: 12px 0;
            padding: 16px;
            background: var(--bg-input);
            border-radius: 12px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.95);
            transition: all 0.5s ease;
        }
        .revealed-message.show {
            opacity: 1;
            transform: scale(1);
        }

        .play-controls {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* ── TRUTH OR DARE UI ── */
        .td-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            padding: 10px 0;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }
        .td-header {
            text-align: center;
        }
        .td-header .td-icon {
            font-size: 4rem;
            margin-bottom: 8px;
        }
        .td-header h2 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--truth-color), var(--dare-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .td-header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .td-choice-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 400px;
        }
        .td-choice-btn {
            padding: 40px 20px;
            border: none;
            border-radius: var(--radius);
            font-size: 1.4rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            background: var(--bg-card);
            color: var(--text-primary);
            box-shadow: var(--shadow);
            border: 3px solid transparent;
        }
        .td-choice-btn i {
            font-size: 3rem;
        }
        .td-choice-btn.truth-btn {
            border-color: var(--truth-color);
            color: var(--truth-color);
        }
        .td-choice-btn.truth-btn:hover {
            background: var(--truth-color);
            color: #1a1a2e;
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(79, 195, 247, 0.3);
        }
        .td-choice-btn.dare-btn {
            border-color: var(--dare-color);
            color: var(--dare-color);
        }
        .td-choice-btn.dare-btn:hover {
            background: var(--dare-color);
            color: #1a1a2e;
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(255, 138, 101, 0.3);
        }

        .td-question-box {
            width: 100%;
            max-width: 450px;
            padding: 30px 24px;
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            text-align: center;
            animation: fadeUp 0.4s ease;
        }
        .td-question-box .q-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .td-question-box .q-label.truth-label {
            color: var(--truth-color);
        }
        .td-question-box .q-label.dare-label {
            color: var(--dare-color);
        }
        .td-question-box .q-text {
            font-size: 1.4rem;
            font-weight: 600;
            line-height: 1.6;
            margin: 12px 0 20px;
            min-height: 70px;
        }
        .td-question-box .q-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* ── SETTINGS ── */
        .settings-group {
            margin: 24px 0;
        }
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid var(--border-subtle);
        }
        .setting-item span {
            font-weight: 500;
        }
        .toggle {
            position: relative;
            width: 50px;
            height: 28px;
            background: var(--bg-input);
            border-radius: 50px;
            cursor: pointer;
            transition: background var(--transition);
        }
        .toggle.active {
            background: var(--accent);
        }
        .toggle::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 22px;
            height: 22px;
            background: #fff;
            border-radius: 50%;
            transition: transform var(--transition);
        }
        .toggle.active::after {
            transform: translateX(22px);
        }

        /* ── CUSTOM CARD CREATOR ── */
        .creator-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 16px;
        }
        @media (min-width: 768px) {
            .creator-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 2px solid var(--border-subtle);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            transition: border var(--transition);
            outline: none;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--accent);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }
        .form-group input[type="file"] {
            padding: 10px 0;
            border: none;
            background: transparent;
        }
        .form-group input[type="file"]::file-selector-button {
            padding: 8px 18px;
            border-radius: 50px;
            border: none;
            background: var(--accent);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: background var(--transition);
            margin-right: 12px;
        }
        .form-group input[type="file"]::file-selector-button:hover {
            background: var(--accent-hover);
        }

        .image-preview {
            margin-top: 10px;
            width: 100%;
            max-width: 200px;
            aspect-ratio: 1 / 1;
            border-radius: 12px;
            overflow: hidden;
            background: var(--bg-input);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed var(--border-subtle);
        }
        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .image-preview .placeholder {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-align: center;
            padding: 12px;
        }

        .custom-card-list {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .custom-card-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 18px;
            background: var(--bg-input);
            border-radius: 12px;
            transition: background var(--transition);
        }
        .custom-card-item:hover {
            background: var(--bg-card);
        }
        .custom-card-item .thumb {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
            background: var(--bg-primary);
        }
        .custom-card-item .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .custom-card-item .info {
            flex: 1;
            min-width: 0;
        }
        .custom-card-item .info .title {
            font-weight: 600;
            font-size: 0.95rem;
        }
        .custom-card-item .info .msg {
            font-size: 0.8rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .custom-card-item .info .cat {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--accent);
            letter-spacing: 0.5px;
        }
        .custom-card-item .actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .custom-card-item .actions button {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1rem;
            padding: 4px 8px;
            border-radius: 8px;
            transition: all var(--transition);
        }
        .custom-card-item .actions button:hover {
            color: var(--accent);
            background: rgba(255, 107, 138, 0.1);
        }
        .custom-card-item .actions button.delete:hover {
            color: #e74c3c;
            background: rgba(231, 76, 60, 0.1);
        }

        .empty-custom {
            color: var(--text-secondary);
            text-align: center;
            padding: 30px 0;
            font-style: italic;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 600px) {
            .hero h1 {
                font-size: 2rem;
            }
            .section-title {
                font-size: 1.4rem;
            }
            .canvas-wrapper {
                max-width: 100%;
            }
            .footer-links a {
                margin-left: 12px;
            }
            .custom-card-item {
                flex-wrap: wrap;
            }
            .custom-card-item .actions {
                width: 100%;
                justify-content: flex-end;
            }
            .td-choice-grid {
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }
            .td-choice-btn {
                padding: 24px 12px;
                font-size: 1.1rem;
            }
            .td-choice-btn i {
                font-size: 2.2rem;
            }
            .td-question-box .q-text {
                font-size: 1.1rem;
            }
            .categories-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 12px;
            }
            .cat-card {
                padding: 16px 12px;
            }
            .cat-card .cat-icon {
                font-size: 1.8rem;
            }
            .cat-card .cat-name {
                font-size: 0.85rem;
            }
        }
        @media (min-width: 768px) {
            .categories-grid {
                gap: 20px;
            }
        }

        code {
            background: var(--bg-input);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.85rem;
            color: var(--accent);
        }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            background: var(--accent);
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <footer id="main-footer">
        <div class="footer-inner">
            <p>&copy; 2026 <strong>Scratch Quest</strong> — Made with <i class="fas fa-heart" style="color: #ff6b8a;"></i></p>
            <div class="footer-links">
                <a href="#" data-nav="home"><i class="fas fa-home"></i></a>
                <a href="#" data-nav="play"><i class="fas fa-gamepad"></i></a>
                <a href="#" data-nav="customize"><i class="fas fa-pen-fancy"></i></a>
                <a href="#" data-nav="settings"><i class="fas fa-cog"></i></a>
            </div>
        </div>
    </footer>

    <script>
        // ═══════════════════════════════════════════════════════════════
        //  SCRATCH QUEST – with TRUTH or DARE & CATEGORY CARDS
        // ═══════════════════════════════════════════════════════════════

        // ── TRUTH & DARE QUESTIONS ──
        const TRUTH_QUESTIONS = [
            "What's the most romantic thing you've ever done for someone?",
            "What's your favourite memory of us together?",
            "What's one thing you've always wanted to tell me but haven't?",
            "What's your idea of a perfect date?",
            "What's the most romantic song that reminds you of me?",
            "What's your favourite thing about me?",
            "What's one thing you'd change about our relationship?",
            "What's your love language?",
            "What's the most spontaneous thing you've done for love?",
            "What's your dream vacation with me?",
            "When did you first know you liked me?",
            "What's the most romantic movie you've seen?",
            "What's a secret dream you have for our future?",
            "What's the best compliment you've ever received?",
            "What's your favourite physical feature of mine?",
            "What's something you've learned from our relationship?",
            "What's your favourite date we've been on?",
            "What would you do if you had a million dollars?",
            "What's your biggest fear in relationships?",
            "What's the most meaningful gift you've ever given?",
            "What's a song that makes you think of me every time?",
            "What's the most adventurous thing you've done for love?",
            "What's your favourite thing about being in a relationship?",

        const DEFAULT_CATEGORIES = ['Romantic', 'Date Ideas', 'Compliments', 'Conversation Starters', 'Fun Challenges',

        ];

        // ── STATE ──
        let cards = [];
        let categories = [];
        let settings = { theme: 'dark', sound: true };
        let selectedCategory = 'All';
        let currentCard = null;
        let isRevealed = false;
        let currentPage = 'home';

        // Truth or Dare state
        let tdState = 'choice'; // 'choice' | 'truth' | 'dare'
        let currentQuestion = '';

        // ── Load from localStorage ──
        function loadState() {
            const saved = localStorage.getItem('scratchQuestData');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    cards = parsed.cards || [];
                    categories = parsed.categories || DEFAULT_CATEGORIES.slice();
                    settings = parsed.settings || { theme: 'dark', sound: true };
                    selectedCategory = parsed.selectedCategory || 'All';
                } catch (e) { /* ignore */ }
            } else {
                cards = DEFAULT_CARDS.map(c => ({ ...c }));
                categories = DEFAULT_CATEGORIES.slice();
                settings = { theme: 'dark', sound: true };
                selectedCategory = 'All';
            }

            // ── ALWAYS ensure Truth or Dare category and card exist ──
            if (!categories.includes('Truth or Dare')) {
                categories.push('Truth or Dare');
            }

            // Remove any duplicate Truth or Dare cards, keep only the special one
            const tdCards = cards.filter(c => c.category === 'Truth or Dare');
            if (tdCards.length > 1) {
                // Keep only the one with isTruthDare: true
                cards = cards.filter(c => c.category !== 'Truth or Dare' || c.isTruthDare === true);
                // If none had isTruthDare: true, add the default one
                if (!cards.some(c => c.isTruthDare === true)) {
                    const tdCard = DEFAULT_CARDS.find(c => c.isTruthDare);
                    if (tdCard) cards.push({ ...tdCard, dateCreated: Date.now() });
                }
            } else if (tdCards.length === 1 && !tdCards[0].isTruthDare) {
                // The single card doesn't have the flag - replace it
                cards = cards.filter(c => c.category !== 'Truth or Dare');
                const tdCard = DEFAULT_CARDS.find(c => c.isTruthDare);
                if (tdCard) cards.push({ ...tdCard, dateCreated: Date.now() });
            } else if (tdCards.length === 0) {
                // No Truth or Dare card at all
                const tdCard = DEFAULT_CARDS.find(c => c.isTruthDare);
                if (tdCard) cards.push({ ...tdCard, dateCreated: Date.now() });
            }

            // Ensure selectedCategory is valid
            if (!categories.includes(selectedCategory) && selectedCategory !== 'All') {
                selectedCategory = 'All';
            }
        }

        function saveState() {
            try {
                localStorage.setItem('scratchQuestData', JSON.stringify({
                    cards,
                    categories,
                    settings,
                    selectedCategory
                }));
            } catch (e) { /* ignore */ }
        }

        loadState();

        // ── SOUND ──
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new(window.AudioContext || window.webkitAudioContext)();
        }

        function playScratchSound() {
            if (!settings.sound) return;
            try {
                initAudio();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 200 + Math.random() * 400;
                osc.type = 'sawtooth';
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            } catch (e) { /* ignore */ }
        }

        function playRevealSound() {
            if (!settings.sound) return;
            try {
                initAudio();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 880;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.frequency.value = 1100;
                osc2.type = 'sine';
                gain2.gain.setValueAtTime(0.15, audioCtx.currentTime + 0.1);
                gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
                osc2.start(audioCtx.currentTime + 0.1);
                osc2.stop(audioCtx.currentTime + 0.4);
            } catch (e) { /* ignore */ }
        }

        // ── HELPERS ──
        function getFilteredCards() {
            if (selectedCategory === 'All') return cards.slice();
            return cards.filter(c => c.category === selectedCategory);
        }

        function getCardCount(category) {
            if (category === 'All') return cards.length;
            return cards.filter(c => c.category === category).length;
        }

        function getRandomCardFromCategory(category) {
            let pool = category === 'All' ? cards : cards.filter(c => c.category === category);
            // If category is 'Truth or Dare', prefer the special card
            if (category === 'Truth or Dare') {
                const special = pool.find(c => c.isTruthDare === true);
                if (special) return special;
            }
            if (pool.length === 0) return null;
            return pool[Math.floor(Math.random() * pool.length)];
        }

        function getNextCard() {
            const pool = getFilteredCards();
            if (pool.length === 0) return null;
            if (pool.length === 1) return pool[0];
            const filtered = pool.filter(c => c.id !== (currentCard ? currentCard.id : ''));
            return filtered.length ? filtered[Math.floor(Math.random() * filtered.length)] : pool[Math.floor(Math
            .random() * pool.length)];
        }

                    break;

                    break;

            document.getElementById('app').innerHTML = html;
            attachEvents();
            if (currentPage === 'play' && currentCard && !currentCard.isTruthDare) {
                initScratchCard();
            }
            saveState();
        }

        // ── TRUTH OR DARE UI ──
        function renderTruthDare() {
            let content = '';

            if (tdState === 'choice') {
                content = `
                    <div class="td-header">
                        <div class="td-icon">🎲</div>
                        <h2>Truth or Dare</h2>
                        <p>Scratch the card then pick your challenge!</p>
                    </div>
                    <div class="td-choice-grid">
                        <button class="td-choice-btn truth-btn" id="tdTruthBtn">
                            <i class="fas fa-user"></i>
                            <span>Truth</span>
                        </button>
                        <button class="td-choice-btn dare-btn" id="tdDareBtn">
                            <i class="fas fa-bolt"></i>
                            <span>Dare</span>
                        </button>
                    </div>
                    <div style="margin-top:8px; font-size:0.8rem; color:var(--text-secondary);">
                        <i class="fas fa-info-circle"></i> Choose Truth or Dare to reveal your question
                    </div>
                `;
            } else {
                const isTruth = tdState === 'truth';
                const label = isTruth ? 'TRUTH' : 'DARE';
                const labelClass = isTruth ? 'truth-label' : 'dare-label';
                const icon = isTruth ? 'fa-user' : 'fa-bolt';
                const color = isTruth ? 'var(--truth-color)' : 'var(--dare-color)';
                const question = currentQuestion || (isTruth ? getRandomTruth() : getRandomDare());

                content = `
                    <div class="td-question-box">
                        <div class="q-label ${labelClass}">
                            <i class="fas ${icon}"></i> ${label}
                        </div>
                        <div class="q-text">${question}</div>
                        <div class="q-actions">
                            <button class="btn btn-sm" id="tdNewQuestionBtn" style="background:${color}; color:#1a1a2e;">
                                <i class="fas fa-redo"></i> New ${label}
                            </button>
                            <button class="btn btn-outline btn-sm" id="tdBackBtn">
                                <i class="fas fa-arrow-left"></i> Back
                            </button>
                        </div>
                    </div>
                    <div style="margin-top:12px; font-size:0.8rem; color:var(--text-secondary);">
                        <i class="fas fa-info-circle"></i> Get a new question or go back to choose again
                    </div>
                `;
            }

            return `
                <div class="page active">
                    <div class="td-container">
                        ${content}
                        <div class="play-controls" style="margin-top:8px;">
                            <button class="btn" id="nextCardBtn"><i class="fas fa-arrow-right"></i> Next Card</button>
                            <button class="btn btn-outline btn-sm" id="resetCardBtn"><i class="fas fa-undo"></i> Reset</button>
                        </div>
                    </div>
                </div>
            `;
        }

        // ── CUSTOMIZE ──
        function renderCustomize() {
            const customCards = cards.filter(c => c.isCustom);
            const categoryOptions = categories.map(c =>
                `<option value="${c}">${c}</option>`
            ).join('');

            let listHtml = '';
            if (customCards.length === 0) {
                listHtml = `<div class="empty-custom">✨ No custom cards yet. Create one below!</div>`;
            } else {
                listHtml = customCards.map(c => `
                    <div class="custom-card-item" data-id="${c.id}">
                        <div class="thumb">
                            ${c.image ? `<img src="${c.image}" alt="${c.title}" />` :
                            `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--bg-input);color:var(--text-secondary);font-size:1.5rem;">❤️</div>`}
                        </div>
                        <div class="info">
                            <div class="title">${c.title}</div>
                            <div class="msg">${c.hiddenMessage || 'No message'}</div>
                            <div class="cat"><i class="fas ${getCategoryIcon(c.category)}"></i> ${c.category}</div>
                        </div>
                        <div class="actions">
                            <button class="play-btn" data-id="${c.id}" title="Play this card"><i class="fas fa-play"></i></button>
                            <button class="delete" data-id="${c.id}" title="Delete"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                `).join('');
            }

            return `
                <div class="page active">
                    <div class="section-title"><i class="fas fa-pen-fancy"></i> Customize</div>
                    <p style="color:var(--text-secondary); margin-bottom:20px;">
                        Upload your own images and write secret messages to create personalised scratch cards.
                    </p>

                    <div class="card">
                        <h3 style="margin-bottom:16px;"><i class="fas fa-plus-circle" style="color:var(--accent);"></i> Create New Card</h3>
                        <div class="creator-grid">
                            <div>
                                <div class="form-group">
                                    <label>Card Title *</label>
                                    <input type="text" id="customTitle" placeholder="e.g. Our Favourite Place" maxlength="60" />
                                </div>
                                <div class="form-group">
                                    <label>Category *</label>
                                    <select id="customCategory">${categoryOptions}</select>
                                </div>
                                <div class="form-group">
                                    <label>Secret Message *</label>
                                    <textarea id="customMessage" placeholder="Write the message that appears when scratched..." rows="3"></textarea>
                                </div>
                            </div>
                            <div>
                                <div class="form-group">
                                    <label>Upload Image</label>
                                    <input type="file" id="customImageInput" accept="image/*" />
                                    <div class="image-preview" id="imagePreview">
                                        <div class="placeholder"><i class="fas fa-image" style="font-size:2rem;display:block;margin-bottom:6px;"></i>No image selected</div>
                                    </div>
                                </div>
                                <button class="btn btn-success" id="addCustomCardBtn" style="width:100%;">
                                    <i class="fas fa-plus"></i> Add Card
                                </button>
                            </div>
                        </div>
                    </div>

                    <div style="margin-top:28px;">
                        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
                            <h3><i class="fas fa-list" style="color:var(--accent);"></i> Your Custom Cards (${customCards.length})</h3>
                            ${customCards.length > 0 ? `<button class="btn btn-danger btn-sm" id="clearCustomBtn"><i class="fas fa-trash"></i> Clear All</button>` : ''}
                        </div>
                        <div class="custom-card-list">${listHtml}</div>
                    </div>

                    <div style="margin-top:20px; padding:16px; background:var(--bg-card); border-radius:12px; font-size:0.85rem; color:var(--text-secondary);">
                        <i class="fas fa-info-circle"></i>
                        Your custom cards are saved in your browser and will appear alongside the default cards.
                        <span class="badge" style="margin-left:8px;">saved locally</span>
                    </div>
                </div>
            `;
        }

        // ── SETTINGS ──
        function renderSettings() {
            const themeIcon = settings.theme === 'dark' ? 'fa-moon' : 'fa-sun';
            const soundIcon = settings.sound ? 'fa-volume-up' : 'fa-volume-mute';
            const totalCards = cards.length;
            const customCount = cards.filter(c => c.isCustom).length;
            return `
                <div class="page active">
                    <div class="section-title"><i class="fas fa-cog"></i> Settings</div>
                    <div class="settings-group card">
                        <div class="setting-item">
                            <span><i class="fas ${themeIcon}"></i> Theme</span>
                            <div class="toggle ${settings.theme === 'light' ? 'active' : ''}" id="themeToggle"></div>
                        </div>
                        <div class="setting-item">
                            <span><i class="fas ${soundIcon}"></i> Sound Effects</span>
                            <div class="toggle ${settings.sound ? 'active' : ''}" id="soundToggle"></div>
                        </div>
                        <div class="setting-item" style="border-bottom:none; padding-bottom:4px;">
                            <span><i class="fas fa-layer-group"></i> Total Cards</span>
                            <span style="color:var(--accent);">${totalCards} <span style="color:var(--text-secondary);font-weight:400;">(${customCount} custom)</span></span>
                        </div>
                    </div>
                    <div style="margin-top:20px; padding:16px; background:var(--bg-card); border-radius:12px; font-size:0.8rem; color:var(--text-secondary);">
                        <i class="fas fa-database"></i> All data is stored locally in your browser.
                        <button class="btn btn-danger btn-sm" style="margin-top:10px;" id="resetAllBtn">
                            <i class="fas fa-undo-alt"></i> Reset to Default Cards
                        </button>
                    </div>
                </div>
            `;
        }

        // ── EVENTS ──
        function attachEvents() {
            // Navigation
            document.querySelectorAll('[data-nav]').forEach(el => {
                el.onclick = (e) => { e.preventDefault();
                    navigate(el.dataset.nav); };
            });

            // Home: category cards
            document.querySelectorAll('.cat-card').forEach(el => {
                el.onclick = () => {
                    const cat = el.dataset.cat;
                    if (!cat) return;
                    selectedCategory = cat;
                    const card = getRandomCardFromCategory(cat);
                    if (card) {
                        currentCard = card;
                        tdState = 'choice';
                        currentQuestion = '';
                        navigate('play');
                    } else {
                        alert(`No cards in "${cat}" category.`);
                    }
                };
            });

            // Home: random card button
            document.getElementById('randomCardBtn')?.addEventListener('click', () => {
                const pool = getFilteredCards();
                if (pool.length) {
                    currentCard = pool[Math.floor(Math.random() * pool.length)];
                    tdState = 'choice';
                    currentQuestion = '';
                    navigate('play');
                } else alert('No cards available in this category.');
            });

            // Settings: theme toggle
            document.getElementById('themeToggle')?.addEventListener('click', () => {
                settings.theme = settings.theme === 'dark' ? 'light' : 'dark';
                saveState();
                render();
            });

            // Settings: sound toggle
            document.getElementById('soundToggle')?.addEventListener('click', () => {
                settings.sound = !settings.sound;
                saveState();
                render();
            });

            // Settings: reset all
            document.getElementById('resetAllBtn')?.addEventListener('click', () => {
                if (confirm('Reset all cards to defaults? Your custom cards will be lost.')) {
                    cards = DEFAULT_CARDS.map(c => ({ ...c }));
                    categories = DEFAULT_CATEGORIES.slice();
                    selectedCategory = 'All';
                    currentCard = null;
                    tdState = 'choice';
                    currentQuestion = '';
                    saveState();
                    render();
                }
            });

            // ── PLAY EVENTS ──
            document.getElementById('nextCardBtn')?.addEventListener('click', () => {
                const next = getNextCard();
                if (next) {
                    currentCard = next;
                    tdState = 'choice';
                    currentQuestion = '';
                    navigate('play');
                } else alert('No more cards in this category.');
            });

            document.getElementById('resetCardBtn')?.addEventListener('click', () => {
                tdState = 'choice';
                currentQuestion = '';
                navigate('play');
            });

            // ── TRUTH OR DARE EVENTS ──
            document.getElementById('tdTruthBtn')?.addEventListener('click', () => {
                tdState = 'truth';
                currentQuestion = getRandomTruth();
                render();
                attachEvents();
            });

            document.getElementById('tdDareBtn')?.addEventListener('click', () => {
                tdState = 'dare';
                currentQuestion = getRandomDare();
                render();
                attachEvents();
            });

            document.getElementById('tdNewQuestionBtn')?.addEventListener('click', () => {
                if (tdState === 'truth') {
                    currentQuestion = getRandomTruth();
                } else if (tdState === 'dare') {
                    currentQuestion = getRandomDare();
                }
                render();
                attachEvents();
            });

            document.getElementById('tdBackBtn')?.addEventListener('click', () => {
                tdState = 'choice';
                currentQuestion = '';
                render();
                attachEvents();
            });

            // ── CUSTOMIZE EVENTS ──
            const fileInput = document.getElementById('customImageInput');
            const preview = document.getElementById('imagePreview');
            if (fileInput && preview) {
                fileInput.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            preview.innerHTML = `<img src="${ev.target.result}" alt="Preview" />`;
                        };
                        reader.readAsDataURL(file);
                    } else {
                        preview.innerHTML =
                            `<div class="placeholder"><i class="fas fa-image" style="font-size:2rem;display:block;margin-bottom:6px;"></i>No image selected</div>`;
                    }
                });
            }

            document.getElementById('addCustomCardBtn')?.addEventListener('click', () => {
                const title = document.getElementById('customTitle').value.trim();
                const category = document.getElementById('customCategory').value;
                const message = document.getElementById('customMessage').value.trim();
                const fileInput2 = document.getElementById('customImageInput');
                const file = fileInput2.files[0];

                if (!title) { alert('Please enter a card title.'); return; }
                if (!message) { alert('Please enter a secret message.'); return; }

                const reader = new FileReader();
                reader.onload = (ev) => {
                    const imageData = ev.target.result;
                    const newCard = {
                        id: 'custom_' + generateId(),
                        title: title,
                        category: category,
                        hiddenMessage: message,
                        difficulty: 'custom',
                        image: imageData || '',
                        dateCreated: Date.now(),
                        isCustom: true
                    };
                    cards.push(newCard);
                    if (!categories.includes(category)) {
                        categories.push(category);
                    }
                    saveState();
                    document.getElementById('customTitle').value = '';
                    document.getElementById('customMessage').value = '';
                    fileInput2.value = '';
                    if (preview) {
                        preview.innerHTML =
                            `<div class="placeholder"><i class="fas fa-image" style="font-size:2rem;display:block;margin-bottom:6px;"></i>No image selected</div>`;
                    }
                    render();
                    attachCustomEvents();
                };
                if (file) {
                    reader.readAsDataURL(file);
                } else {
                    const newCard = {
                        id: 'custom_' + generateId(),
                        title: title,
                        category: category,
                        hiddenMessage: message,
                        difficulty: 'custom',
                        image: '',
                        dateCreated: Date.now(),
                        isCustom: true
                    };
                    cards.push(newCard);
                    if (!categories.includes(category)) {
                        categories.push(category);
                    }
                    saveState();
                    document.getElementById('customTitle').value = '';
                    document.getElementById('customMessage').value = '';
                    fileInput2.value = '';
                    if (preview) {
                        preview.innerHTML =
                            `<div class="placeholder"><i class="fas fa-image" style="font-size:2rem;display:block;margin-bottom:6px;"></i>No image selected</div>`;
                    }
                    render();
                    attachCustomEvents();
                }
            });

            attachCustomEvents();

            document.getElementById('clearCustomBtn')?.addEventListener('click', () => {
                if (confirm('Delete ALL custom cards?')) {
                    cards = cards.filter(c => !c.isCustom);
                    saveState();
                    render();
                    attachCustomEvents();
                }
            });
        }

        // ── CUSTOM CARD EVENTS ──
        function attachCustomEvents() {
            document.querySelectorAll('.custom-card-item .play-btn').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const id = btn.dataset.id;
                    const card = cards.find(c => c.id === id);
                    if (card) {
                        currentCard = card;
                        tdState = 'choice';
                        currentQuestion = '';
                        navigate('play');
                    }
                };
            });
            document.querySelectorAll('.custom-card-item .delete').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const id = btn.dataset.id;
                    if (confirm('Delete this custom card?')) {
                        cards = cards.filter(c => c.id !== id);
                        saveState();
                        render();
                        attachCustomEvents();
                    }
                };
            });
        }

        // ── SCRATCH CANVAS ──
        let canvas, ctx, canvasWidth, canvasHeight;
        let isDrawing = false;
        let revealPercent = 0;
        let backgroundImage = null;
        let imageLoaded = false;

        function initScratchCard() {
            canvas = document.getElementById('scratchCanvas');
            if (!canvas) return;
            ctx = canvas.getContext('2d');
            canvasWidth = canvas.width;
            canvasHeight = canvas.height;

            const card = currentCard;
            if (!card) return;

            const imgSrc = card.image && card.image.trim() !== '' ? card.image : null;
            const img = new Image();
            img.crossOrigin = 'Anonymous';

            img.onload = function() {
                backgroundImage = img;
                imageLoaded = true;
                drawCard();
            };

            img.onerror = function() {
                backgroundImage = null;
                imageLoaded = false;
                drawCard();
            };

            if (imgSrc) {
                img.src = imgSrc;
            } else {
                imageLoaded = false;
                drawCard();
            }

            canvas.addEventListener('mousedown', startScratch);
            canvas.addEventListener('mousemove', scratch);
            canvas.addEventListener('mouseup', endScratch);
            canvas.addEventListener('mouseleave', endScratch);
            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
            canvas.addEventListener('touchend', endScratch, { passive: false });

            isRevealed = false;
            const msgEl = document.getElementById('revealedMessage');
            if (msgEl) msgEl.classList.remove('show');
            canvas.style.pointerEvents = 'auto';
        }

        function drawCard() {
            ctx.clearRect(0, 0, canvasWidth, canvasHeight);

            let drawSuccess = false;
            if (imageLoaded && backgroundImage) {
                try {
                    const img = backgroundImage;
                    const imgAspect = img.width / img.height;
                    const canvasAspect = canvasWidth / canvasHeight;
                    let drawW, drawH, offsetX, offsetY;
                    if (imgAspect > canvasAspect) {
                        drawW = canvasWidth;
                        drawH = canvasWidth / imgAspect;
                        offsetX = 0;
                        offsetY = (canvasHeight - drawH) / 2;
                    } else {
                        drawH = canvasHeight;
                        drawW = canvasHeight * imgAspect;
                        offsetX = (canvasWidth - drawW) / 2;
                        offsetY = 0;
                    }
                    ctx.drawImage(img, offsetX, offsetY, drawW, drawH);
                    drawSuccess = true;
                } catch (e) { /* fall through */ }
            }

            if (!drawSuccess) {
                const grad = ctx.createLinearGradient(0, 0, canvasWidth, canvasHeight);
                grad.addColorStop(0, '#ff9a9e');
                grad.addColorStop(0.5, '#fecfef');
                grad.addColorStop(1, '#fdfcfb');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvasWidth, canvasHeight);
                ctx.fillStyle = 'rgba(255,107,138,0.25)';
                ctx.font = '120px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('❤️', canvasWidth / 2, canvasHeight / 2);
                ctx.fillStyle = 'rgba(255,107,138,0.15)';
                ctx.fillRect(0, 0, canvasWidth, canvasHeight);
            }

            ctx.globalCompositeOperation = 'source-over';
            const overlayGrad = ctx.createLinearGradient(0, 0, canvasWidth, canvasHeight);
            overlayGrad.addColorStop(0, '#b8b0a8');
            overlayGrad.addColorStop(0.3, '#d0c8c0');
            overlayGrad.addColorStop(0.6, '#a09890');
            overlayGrad.addColorStop(1, '#c8c0b8');
            ctx.fillStyle = overlayGrad;
            ctx.fillRect(0, 0, canvasWidth, canvasHeight);

            for (let i = 0; i < 1500; i++) {
                const x = Math.random() * canvasWidth;
                const y = Math.random() * canvasHeight;
                const size = 1 + Math.random() * 3;
                const alpha = 0.05 + Math.random() * 0.15;
                ctx.fillStyle = `rgba(80,70,60,${alpha})`;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, 2 * Math.PI);
                ctx.fill();
            }
            ctx.strokeStyle = 'rgba(255,255,255,0.08)';
            ctx.lineWidth = 2;
            for (let i = 0; i < 20; i++) {
                ctx.beginPath();
                ctx.moveTo(Math.random() * canvasWidth, Math.random() * canvasHeight);
                ctx.lineTo(Math.random() * canvasWidth, Math.random() * canvasHeight);
                ctx.stroke();
            }

            ctx.fillStyle = '#4a3f38';
            ctx.font = 'bold 28px Inter, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(255,255,255,0.2)';
            ctx.shadowBlur = 6;
            ctx.fillText('✦ SCRATCH ✦', canvasWidth / 2, canvasHeight / 2 - 10);
            ctx.shadowBlur = 0;
            ctx.font = '14px Inter, sans-serif';
            ctx.fillStyle = '#6a5f58';
            ctx.fillText('drag to reveal', canvasWidth / 2, canvasHeight / 2 + 40);
        }

        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches) { clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY; } else { clientX = e.clientX;
                clientY = e.clientY; }
            const x = (clientX - rect.left) * scaleX;
            const y = (clientY - rect.top) * scaleY;
            if (x < 0 || x > canvas.width || y < 0 || y > canvas.height) return null;
            return { x, y };
        }

        function startScratch(e) { e.preventDefault(); if (isRevealed) return;
            isDrawing = true;
            scratch(e); }

        function scratch(e) {
            if (!isDrawing || isRevealed) return;
            e.preventDefault();
            const pos = getCanvasCoords(e);
            if (!pos) return;
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, 28, 0, 2 * Math.PI);
            ctx.fill();
            if (Math.random() < 0.12) playScratchSound();
            checkReveal();
        }

        function endScratch(e) { if (isDrawing) { isDrawing = false;
                checkReveal(); } }

        function handleTouchStart(e) { e.preventDefault(); const touch = e.touches[0];
            canvas.dispatchEvent(new MouseEvent('mousedown', { clientX: touch.clientX, clientY: touch.clientY })); }

        function handleTouchMove(e) { e.preventDefault(); const touch = e.touches[0];
            canvas.dispatchEvent(new MouseEvent('mousemove', { clientX: touch.clientX, clientY: touch.clientY })); }

        function checkReveal() {
            if (isRevealed) return;
            const imageData = ctx.getImageData(0, 0, canvasWidth, canvasHeight);
            const data = imageData.data;
            let transparent = 0;
            const total = data.length / 4;
            for (let i = 3; i < data.length; i += 4) { if (data[i] < 128) transparent++; }
            revealPercent = transparent / total;
            if (revealPercent > 0.40) {
                isRevealed = true;
                fadeOutOverlay();
                const msgEl = document.getElementById('revealedMessage');
                if (msgEl) msgEl.classList.add('show');
                playRevealSound();
                canvas.style.pointerEvents = 'none';
            }
        }

        function fadeOutOverlay() {
            let opacity = 1.0;
            const step = () => {
                if (opacity <= 0) {
                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, canvasWidth, canvasHeight);
                    ctx.globalCompositeOperation = 'source-over';
                    return;
                }
                ctx.globalCompositeOperation = 'destination-out';
                ctx.fillStyle = `rgba(255,255,255,${0.1})`;
                ctx.fillRect(0, 0, canvasWidth, canvasHeight);
                opacity -= 0.1;
                requestAnimationFrame(step);
            };
            step();
        }

        // ── START ──
        navigate('home');
    </script>
</body>
</html>
