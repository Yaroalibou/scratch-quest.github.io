<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Scratch Quest – Truth or Dare</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <style>
        /* ── RESET & ROOT ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg-primary: #0d0d0f;
            --bg-secondary: #1a1a1f;
            --bg-card: #24242b;
            --bg-input: #2c2c35;
            --text-primary: #f0eef2;
            --text-secondary: #b0aeb8;
            --accent: #ff6b8a;
            --accent-hover: #ff4d73;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            --radius: 20px;
            --transition: 0.3s ease;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --truth-color: #4fc3f7;
            --dare-color: #ff8a65;
        }
        body.light {
            --bg-primary: #f5f3f7;
            --bg-secondary: #eae8ed;
            --bg-card: #ffffff;
            --bg-input: #f0eef3;
            --text-primary: #1e1c22;
            --text-secondary: #4a4850;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            --border-subtle: rgba(0, 0, 0, 0.06);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background var(--transition), color var(--transition);
        }

        #app {
            flex: 1;
            padding: 20px 16px 90px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        /* ── FOOTER ── */
        #main-footer {
            background: var(--bg-secondary);
            padding: 14px 20px;
            border-top: 1px solid var(--border-subtle);
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            transition: background var(--transition);
        }
        .footer-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .footer-links a {
            color: var(--text-secondary);
            margin-left: 18px;
            font-size: 1.2rem;
            transition: color var(--transition);
        }
        .footer-links a:hover {
            color: var(--accent);
        }

        /* ── PAGES ── */
        .page {
            display: none;
            animation: fadeUp 0.4s ease;
        }
        .page.active {
            display: block;
        }
        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── BUTTONS ── */
        .btn {
            display: inline-block;
            padding: 12px 28px;
            border: none;
            border-radius: 50px;
            background: var(--accent);
            color: #fff;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background var(--transition), transform 0.15s;
            text-decoration: none;
            box-shadow: 0 4px 14px rgba(255, 107, 138, 0.3);
        }
        .btn:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
        }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            box-shadow: none;
        }
        .btn-outline:hover {
            background: var(--accent);
            color: #fff;
        }
        .btn-sm {
            padding: 8px 16px;
            font-size: 0.85rem;
        }
        .btn-danger {
            background: #e74c3c;
            box-shadow: 0 4px 14px rgba(231, 76, 60, 0.3);
        }
        .btn-danger:hover {
            background: #c0392b;
        }
        .btn-success {
            background: #2ecc71;
            box-shadow: 0 4px 14px rgba(46, 204, 113, 0.3);
        }
        .btn-success:hover {
            background: #27ae60;
        }
        .btn-truth {
            background: var(--truth-color);
            color: #1a1a2e;
            box-shadow: 0 4px 20px rgba(79, 195, 247, 0.4);
        }
        .btn-truth:hover {
            background: #29b6f6;
            transform: scale(1.04);
        }
        .btn-dare {
            background: var(--dare-color);
            color: #1a1a2e;
            box-shadow: 0 4px 20px rgba(255, 138, 101, 0.4);
        }
        .btn-dare:hover {
            background: #ff7043;
            transform: scale(1.04);
        }

        /* ── CARDS ── */
        .card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px 24px;
            box-shadow: var(--shadow);
            transition: background var(--transition), box-shadow var(--transition);
        }
        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .section-title i {
            color: var(--accent);
        }

        /* ── HERO ── */
        .hero {
            text-align: center;
            padding: 40px 0 30px;
        }
        .hero h1 {
            font-size: 2.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #ffb3c6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin: 12px 0 24px;
        }

        /* ── CATEGORY GRID ── */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
            margin: 24px 0 30px;
        }
        .cat-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 24px 16px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition);
            border: 3px solid transparent;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }
        .cat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, transparent 60%, rgba(255, 107, 138, 0.05));
            pointer-events: none;
        }
        .cat-card:hover {
            transform: translateY(-6px) scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
        }
        .cat-card.active {
            border-color: var(--accent);
            background: var(--bg-input);
        }
        .cat-card .cat-icon {
            font-size: 2.4rem;
            margin-bottom: 10px;
            display: block;
            color: var(--accent);
        }
        .cat-card .cat-name {
            font-weight: 600;
            font-size: 1rem;
            display: block;
        }
        .cat-card .cat-count {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 4px;
            display: block;
        }
        .cat-card .cat-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 0.6rem;
            background: var(--accent);
            color: #fff;
            padding: 2px 10px;
            border-radius: 50px;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Special Truth or Dare category card */
        .cat-card.truthdare-card {
            background: linear-gradient(135deg, rgba(79, 195, 247, 0.15), rgba(255, 138, 101, 0.15));
            border-color: var(--truth-color);
        }
        .cat-card.truthdare-card .cat-icon {
            background: linear-gradient(135deg, var(--truth-color), var(--dare-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .cat-card.truthdare-card:hover {
            border-color: var(--dare-color);
        }
        .cat-card.truthdare-card.active {
            border-color: var(--truth-color);
            background: linear-gradient(135deg, rgba(79, 195, 247, 0.25), rgba(255, 138, 101, 0.25));
        }

        .random-section {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
            margin: 20px 0 30px;
        }

        .about-text {
            color: var(--text-secondary);
            line-height: 1.7;
            max-width: 700px;
        }

        /* ── SCRATCH CANVAS ── */
        .scratch-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            padding: 10px 0;
        }
        .canvas-wrapper {
            position: relative;
            width: 100%;
            max-width: 420px;
            aspect-ratio: 1 / 1;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            background: #1e1e26;
        }
        #scratchCanvas {
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
            cursor: pointer;
        }
        .card-info {
            text-align: center;
            width: 100%;
            max-width: 420px;
        }
        .card-title {
            font-size: 1.5rem;
            font-weight: 600;
        }
        .card-category {
            color: var(--accent);
            font-weight: 500;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .revealed-message {
            font-size: 1.2rem;
            margin: 12px 0;
            padding: 16px;
            background: var(--bg-input);
            border-radius: 12px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.95);
            transition: all 0.5s ease;
        }
        .revealed-message.show {
            opacity: 1;
            transform: scale(1);
        }

        .play-controls {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* ── TRUTH OR DARE UI ── */
        .td-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            padding: 10px 0;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }
        .td-header {
            text-align: center;
        }
        .td-header .td-icon {
            font-size: 4rem;
            margin-bottom: 8px;
        }
        .td-header h2 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--truth-color), var(--dare-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .td-header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .td-choice-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 400px;
        }
        .td-choice-btn {
            padding: 40px 20px;
            border: none;
            border-radius: var(--radius);
            font-size: 1.4rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            background: var(--bg-card);
            color: var(--text-primary);
            box-shadow: var(--shadow);
            border: 3px solid transparent;
        }
        .td-choice-btn i {
            font-size: 3rem;
        }
        .td-choice-btn.truth-btn {
            border-color: var(--truth-color);
            color: var(--truth-color);
        }
        .td-choice-btn.truth-btn:hover {
            background: var(--truth-color);
            color: #1a1a2e;
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(79, 195, 247, 0.3);
        }
        .td-choice-btn.dare-btn {
            border-color: var(--dare-color);
            color: var(--dare-color);
        }
        .td-choice-btn.dare-btn:hover {
            background: var(--dare-color);
            color: #1a1a2e;
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(255, 138, 101, 0.3);
        }

        .td-question-box {
            width: 100%;
            max-width: 450px;
            padding: 30px 24px;
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            text-align: center;
            animation: fadeUp 0.4s ease;
        }
        .td-question-box .q-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .td-question-box .q-label.truth-label {
            color: var(--truth-color);
        }
        .td-question-box .q-label.dare-label {
            color: var(--dare-color);
        }
        .td-question-box .q-text {
            font-size: 1.4rem;
            font-weight: 600;
            line-height: 1.6;
            margin: 12px 0 20px;
            min-height: 70px;
        }
        .td-question-box .q-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* ── SETTINGS ── */
        .settings-group {
            margin: 24px 0;
        }
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid var(--border-subtle);
        }
        .setting-item span {
            font-weight: 500;
        }
        .toggle {
            position: relative;
            width: 50px;
            height: 28px;
            background: var(--bg-input);
            border-radius: 50px;
            cursor: pointer;
            transition: background var(--transition);
        }
        .toggle.active {
            background: var(--accent);
        }
        .toggle::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 22px;
            height: 22px;
            background: #fff;
            border-radius: 50%;
            transition: transform var(--transition);
        }
        .toggle.active::after {
            transform: translateX(22px);
        }

        /* ── CUSTOM CARD CREATOR ── */
        .creator-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 16px;
        }
        @media (min-width: 768px) {
            .creator-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 2px solid var(--border-subtle);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            transition: border var(--transition);
            outline: none;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--accent);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }
        .form-group input[type="file"] {
            padding: 10px 0;
            border: none;
            background: transparent;
        }
        .form-group input[type="file"]::file-selector-button {
            padding: 8px 18px;
            border-radius: 50px;
            border: none;
            background: var(--accent);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: background var(--transition);
            margin-right: 12px;
        }
        .form-group input[type="file"]::file-selector-button:hover {
            background: var(--accent-hover);
        }

        .image-preview {
            margin-top: 10px;
            width: 100%;
            max-width: 200px;
            aspect-ratio: 1 / 1;
            border-radius: 12px;
            overflow: hidden;
            background: var(--bg-input);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed var(--border-subtle);
        }
        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .image-preview .placeholder {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-align: center;
            padding: 12px;
        }

        .custom-card-list {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .custom-card-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 18px;
            background: var(--bg-input);
            border-radius: 12px;
            transition: background var(--transition);
        }
        .custom-card-item:hover {
            background: var(--bg-card);
        }
        .custom-card-item .thumb {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
            background: var(--bg-primary);
        }
        .custom-card-item .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .custom-card-item .info {
            flex: 1;
            min-width: 0;
        }
        .custom-card-item .info .title {
            font-weight: 600;
            font-size: 0.95rem;
        }
        .custom-card-item .info .msg {
            font-size: 0.8rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .custom-card-item .info .cat {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--accent);
            letter-spacing: 0.5px;
        }
        .custom-card-item .actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .custom-card-item .actions button {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1rem;
            padding: 4px 8px;
            border-radius: 8px;
            transition: all var(--transition);
        }
        .custom-card-item .actions button:hover {
            color: var(--accent);
            background: rgba(255, 107, 138, 0.1);
        }
        .custom-card-item .actions button.delete:hover {
            color: #e74c3c;
            background: rgba(231, 76, 60, 0.1);
        }

        .empty-custom {
            color: var(--text-secondary);
            text-align: center;
            padding: 30px 0;
            font-style: italic;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 600px) {
            .hero h1 {
                font-size: 2rem;
            }
            .section-title {
                font-size: 1.4rem;
            }
            .canvas-wrapper {
                max-width: 100%;
            }
            .footer-links a {
                margin-left: 12px;
            }
            .custom-card-item {
                flex-wrap: wrap;
            }
            .custom-card-item .actions {
                width: 100%;
                justify-content: flex-end;
            }
            .td-choice-grid {
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }
            .td-choice-btn {
                padding: 24px 12px;
                font-size: 1.1rem;
            }
            .td-choice-btn i {
                font-size: 2.2rem;
            }
            .td-question-box .q-text {
                font-size: 1.1rem;
            }
            .categories-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 12px;
            }
            .cat-card {
                padding: 16px 12px;
            }
            .cat-card .cat-icon {
                font-size: 1.8rem;
            }
            .cat-card .cat-name {
                font-size: 0.85rem;
            }
        }
        @media (min-width: 768px) {
            .categories-grid {
                gap: 20px;
            }
        }

        code {
            background: var(--bg-input);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.85rem;
            color: var(--accent);
        }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            background: var(--accent);
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <footer id="main-footer">
        <div class="footer-inner">
            <p>&copy; 2026 <strong>Scratch Quest</strong> — Made with <i class="fas fa-heart" style="color: #ff6b8a;"></i></p>
            <div class="footer-links">
                <a href="#" data-nav="home"><i class="fas fa-home"></i></a>
                <a href="#" data-nav="play"><i class="fas fa-gamepad"></i></a>
                <a href="#" data-nav="customize"><i class="fas fa-pen-fancy"></i></a>
                <a href="#" data-nav="settings"><i class="fas fa-cog"></i></a>
            </div>
        </div>
    </footer>

    <script>
        // ═════════════════════════════════════════════════════════════
        //  SCRATCH QUEST – with TRUTH or DARE & IMAGE ON CARD
        // ═════════════════════════════════════════════════════════════

        // ── TRUTH & DARE QUESTIONS ──
        const TRUTH_QUESTIONS = [
            "What's the most romantic thing you've ever done for someone?",
            "What's your favourite memory of us together?",
            "What's one thing you've always wanted to tell me but haven't?",
            "What's your idea of a perfect date?",
            "What's the most romantic song that reminds you of me?",
            "What's your favourite thing about me?",
            "What's one thing you'd change about our relationship?",
            "What's your love language?",
            "What's the most spontaneous thing you've done for love?",
            "What's your dream vacation with me?",
            "When did you first know you liked me?",
            "What's the most romantic movie you've seen?",
            "What's a secret dream you have for our future?",
            "What's the best compliment you've ever received?",
            "What's your favourite physical feature of mine?",
            "What's something you've learned from our relationship?",
            "What's your favourite date we've been on?",
            "What would you do if you had a million dollars?",
            "What's your biggest fear in relationships?",
            "What's the most meaningful gift you've ever given?",
            "What's a song that makes you think of me every time?",
            "What's the most adventurous thing you've done for love?",
            "What's your favourite thing about being in a relationship?",

            try {

                cards = saved ? JSON.parse(saved) : [...DEFAULT_CARDS];

                if (savedSettings) settings = JSON.parse(savedSettings);
            } catch (e) { /* ignore */ }

        // ── SOUND ──
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new(window.AudioContext || window.webkitAudioContext)();
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playScratchSound() {
            if (!settings.sound) return;
            try {
                initAudio();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 200 + Math.random() * 400;
                osc.type = 'sawtooth';
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            } catch (e) { /* ignore */ }
        }

        function playRevealSound() {
            if (!settings.sound) return;
            try {
                initAudio();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 880;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.frequency.value = 1100;
                osc2.type = 'sine';
                gain2.gain.setValueAtTime(0.15, audioCtx.currentTime + 0.1);
                gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
                osc2.start(audioCtx.currentTime + 0.1);
                osc2.stop(audioCtx.currentTime + 0.4);
            } catch (e) { /* ignore */ }
        }

            return filtered.length ? filtered[Math.floor(Math.random() * filtered.length)] : pool[Math.floor(Math

            document.getElementById('app').innerHTML = html;

                                <option value="easy">Easy</option>
                                <option value="medium">Medium</option>
                                <option value="hard">Hard</option>
                            </select>
                        </div>
                        <div class="form-group" style="grid-column: 1 / -1;">
                            <label>Card Image (Optional)</label>
                            <input type="file" id="customImage" accept="image/*">
                            <div class="image-preview" id="imagePreview">
                                <div class="placeholder">No image selected</div>
                            </div>
                        </div>
                    </div>
                    <button class="btn" onclick="addCustomCard()" style="width:100%; margin-top:20px;">✨ Create Card</button>
                </div>
                <div class="card" style="margin-top: 30px;">
                    <h2 class="section-title"><i class="fas fa-cards"></i> Your Custom Cards</h2>
                    <div class="custom-card-list">${cardsHtml}</div>
                </div>
            `;
        }

        function addCustomCard() {
            const title = document.getElementById('customTitle').value.trim();
            const category = document.getElementById('customCategory').value;
            const message = document.getElementById('customMessage').value.trim();
            const difficulty = document.getElementById('customDifficulty').value;
            const imageFile = document.getElementById('customImage').files[0];

            if (!title || !message) {
                alert('Please fill in the title and message.');
                return;
            }

            let imageUrl = '';
            if (imageFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imageUrl = e.target.result;
                    const newCard = {
                        id: generateId(),
                        title: title,
                        category: category,
                        hiddenMessage: message,
                        difficulty: difficulty,
                        image: imageUrl,
                        dateCreated: Date.now()
                    };
                    cards.push(newCard);
                    saveState();
                    document.getElementById('customTitle').value = '';
                    document.getElementById('customMessage').value = '';
                    document.getElementById('customImage').value = '';
                    document.getElementById('imagePreview').innerHTML = '<div class="placeholder">No image selected</div>';
                    render();
                    attachCustomEvents();
                };
                reader.readAsDataURL(imageFile);
            } else {
                const newCard = {
                    id: generateId(),
                    title: title,
                    category: category,
                    hiddenMessage: message,
                    difficulty: difficulty,
                    image: '',
                    dateCreated: Date.now()
                };
                cards.push(newCard);
                saveState();
                document.getElementById('customTitle').value = '';
                document.getElementById('customMessage').value = '';
                document.getElementById('customImage').value = '';
                document.getElementById('imagePreview').innerHTML = '<div class="placeholder">No image selected</div>';
                render();
                attachCustomEvents();
            }
        }

        document.addEventListener('change', function(e) {
            if (e.target.id === 'customImage') {
                const file = e.target.files[0];
                const preview = document.getElementById('imagePreview');
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        preview.innerHTML = `<img src="${e.target.result}" alt="preview">`;
                    };
                    reader.readAsDataURL(file);
                } else {
                    preview.innerHTML = '<div class="placeholder">No image selected</div>';
                }
            }
        });

        // ── SETTINGS ──
        function renderSettings() {
            return `
                <div class="card">
                    <h2 class="section-title"><i class="fas fa-cog"></i> Settings</h2>
                    <div class="settings-group">
                        <div class="setting-item">
                            <span>Dark Mode</span>
                            <div class="toggle${settings.theme === 'dark' ? ' active' : ''}" onclick="toggleSetting('theme')"></div>
                        </div>
                        <div class="setting-item">
                            <span>Sound Effects</span>
                            <div class="toggle${settings.sound ? ' active' : ''}" onclick="toggleSetting('sound')"></div>
                        </div>
                        <div class="setting-item">
                            <span>Animations</span>
                            <div class="toggle${settings.animations ? ' active' : ''}" onclick="toggleSetting('animations')"></div>
                        </div>
                    </div>
                </div>
                <div class="card" style="margin-top: 20px;">
                    <h2 class="section-title"><i class="fas fa-info-circle"></i> About</h2>
                    <p style="line-height: 1.6; color: var(--text-secondary);">
                        <strong>Scratch Quest</strong> v1.0<br>
                        A fun interactive game to strengthen your relationship with romantic prompts, dares, and conversation starters.<br><br>
                        <strong>Total Cards:</strong> ${cards.length}<br>
                        <strong>Custom Cards:</strong> ${cards.filter(c => c.id && c.id.length > 2).length}
                    </p>
                </div>
                <div style="text-align: center; margin-top: 30px; padding: 20px; color: var(--text-secondary); font-size: 0.85rem;">
                    <p>© 2026 Scratch Quest — Made with ❤️</p>
                </div>
            `;
        }

        function toggleSetting(key) {
            if (key === 'theme') {
                settings.theme = settings.theme === 'dark' ? 'light' : 'dark';
            } else if (key === 'sound') {
                settings.sound = !settings.sound;
            } else if (key === 'animations') {
                settings.animations = !settings.animations;
            }
            saveState();
            render();
        }

        // ── EVENTS ──
        function attachEvents() {
            document.querySelectorAll('[data-nav]').forEach(btn => {
                btn.onclick = (e) => {
                    e.preventDefault();
                    navigate(btn.dataset.nav);
                };
            });
        }

        // ── CUSTOM CARD EVENTS ──
        function attachCustomEvents() {
            document.querySelectorAll('.custom-card-item .play-btn').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const id = btn.dataset.id;
                    const card = cards.find(c => c.id === id);
                    if (card) {
                        currentCard = card;
                        tdState = 'choice';
                        currentQuestion = '';
                        isTdRevealed = false;
                        navigate('play');
                    }
                };
            });
            document.querySelectorAll('.custom-card-item .delete').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const id = btn.dataset.id;
                    if (confirm('Delete this custom card?')) {
                        cards = cards.filter(c => c.id !== id);
                        saveState();
                        render();
                        attachCustomEvents();
                    }
                };
            });
        }

        function initScratchCard() {
            canvas = document.getElementById('scratchCanvas');
            if (!canvas) return;
            ctx = canvas.getContext('2d');
            canvasWidth = canvas.width;
            canvasHeight = canvas.height;

            const card = currentCard;
            if (!card) return;

            const imgSrc = card.image && card.image.trim() !== '' ? card.image : null;
            const img = new Image();
            img.crossOrigin = 'Anonymous';

            img.onload = function() {
                backgroundImage = img;
                imageLoaded = true;
                drawCard();
            };

            img.onerror = function() {
                backgroundImage = null;
                imageLoaded = false;
                drawCard();
            };

            if (imgSrc) {
                img.src = imgSrc;
            } else {
                imageLoaded = false;
                drawCard();
            }

            // Remove old listeners to avoid duplicates
            canvas.removeEventListener('mousedown', startScratch);
            canvas.removeEventListener('mousemove', scratch);
            canvas.removeEventListener('mouseup', endScratch);
            canvas.removeEventListener('mouseleave', endScratch);
            canvas.removeEventListener('touchstart', handleTouchStart);
            canvas.removeEventListener('touchmove', handleTouchMove);
            canvas.removeEventListener('touchend', endScratch);

            canvas.addEventListener('mousedown', startScratch);
            canvas.addEventListener('mousemove', scratch);
            canvas.addEventListener('mouseup', endScratch);
            canvas.addEventListener('mouseleave', endScratch);
            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
            canvas.addEventListener('touchend', endScratch, { passive: false });

            isRevealed = false;
            const msgEl = document.getElementById('revealedMessage');
            if (msgEl) msgEl.classList.remove('show');
            canvas.style.pointerEvents = 'auto';
        }

        function drawCard() {
            ctx.clearRect(0, 0, canvasWidth, canvasHeight);

            let drawSuccess = false;
            if (imageLoaded && backgroundImage) {
                try {
                    const img = backgroundImage;
                    const imgAspect = img.width / img.height;
                    const canvasAspect = canvasWidth / canvasHeight;
                    let drawW, drawH, offsetX, offsetY;
                    if (imgAspect > canvasAspect) {
                        drawW = canvasWidth;
                        drawH = canvasWidth / imgAspect;
                        offsetX = 0;
                        offsetY = (canvasHeight - drawH) / 2;
                    } else {
                        drawH = canvasHeight;
                        drawW = canvasHeight * imgAspect;
                        offsetX = (canvasWidth - drawW) / 2;
                        offsetY = 0;
                    }
                    ctx.drawImage(img, offsetX, offsetY, drawW, drawH);
                    drawSuccess = true;
                } catch (e) { /* fall through */ }
            }

            if (!drawSuccess) {
                const grad = ctx.createLinearGradient(0, 0, canvasWidth, canvasHeight);
                grad.addColorStop(0, '#ff9a9e');
                grad.addColorStop(0.5, '#fecfef');
                grad.addColorStop(1, '#fdfcfb');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvasWidth, canvasHeight);
                ctx.fillStyle = 'rgba(255,107,138,0.25)';
                ctx.font = '120px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('❤️', canvasWidth / 2, canvasHeight / 2);
                ctx.fillStyle = 'rgba(255,107,138,0.15)';
                ctx.fillRect(0, 0, canvasWidth, canvasHeight);
            }

            ctx.globalCompositeOperation = 'source-over';
            const overlayGrad = ctx.createLinearGradient(0, 0, canvasWidth, canvasHeight);
            overlayGrad.addColorStop(0, '#b8b0a8');
            overlayGrad.addColorStop(0.3, '#d0c8c0');
            overlayGrad.addColorStop(0.6, '#a09890');
            overlayGrad.addColorStop(1, '#c8c0b8');
            ctx.fillStyle = overlayGrad;
            ctx.fillRect(0, 0, canvasWidth, canvasHeight);

            for (let i = 0; i < 1500; i++) {
                const x = Math.random() * canvasWidth;
                const y = Math.random() * canvasHeight;
                const size = 1 + Math.random() * 3;
                const alpha = 0.05 + Math.random() * 0.15;
                ctx.fillStyle = `rgba(80,70,60,${alpha})`;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, 2 * Math.PI);
                ctx.fill();
            }
            ctx.strokeStyle = 'rgba(255,255,255,0.08)';
            ctx.lineWidth = 2;
            for (let i = 0; i < 20; i++) {
                ctx.beginPath();
                ctx.moveTo(Math.random() * canvasWidth, Math.random() * canvasHeight);
                ctx.lineTo(Math.random() * canvasWidth, Math.random() * canvasHeight);
                ctx.stroke();
            }

            ctx.fillStyle = '#4a3f38';
            ctx.fillRect(0, 0, canvasWidth, canvasHeight);
            ctx.font = 'bold 28px Inter, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(255,255,255,0.2)';
            ctx.shadowBlur = 6;
            ctx.fillText('✦ SCRATCH ✦', canvasWidth / 2, canvasHeight / 2 - 10);
            ctx.shadowBlur = 0;
            ctx.font = '14px Inter, sans-serif';
            ctx.fillStyle = '#6a5f58';
            ctx.fillText('drag to reveal', canvasWidth / 2, canvasHeight / 2 + 40);
        }

        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches) { clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY; } else { clientX = e.clientX;
                clientY = e.clientY; }
            const x = (clientX - rect.left) * scaleX;
            const y = (clientY - rect.top) * scaleY;
            if (x < 0 || x > canvas.width || y < 0 || y > canvas.height) return null;
            return { x, y };
        }

        function startScratch(e) { e.preventDefault(); if (isRevealed) return;
            isDrawing = true;
            scratch(e); }

        function scratch(e) {
            if (!isDrawing || isRevealed) return;
            e.preventDefault();
            const pos = getCanvasCoords(e);
            if (!pos) return;
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, 28, 0, 2 * Math.PI);
            ctx.fill();
            if (Math.random() < 0.12) playScratchSound();
            checkReveal();
        }

        function endScratch(e) { if (isDrawing) { isDrawing = false;
                checkReveal(); } }

        function handleTouchStart(e) { e.preventDefault(); const touch = e.touches[0];
            canvas.dispatchEvent(new MouseEvent('mousedown', { clientX: touch.clientX, clientY: touch.clientY })); }

        function handleTouchMove(e) { e.preventDefault(); const touch = e.touches[0];
            canvas.dispatchEvent(new MouseEvent('mousemove', { clientX: touch.clientX, clientY: touch.clientY })); }

        function checkReveal() {
            if (isRevealed) return;
            const imageData = ctx.getImageData(0, 0, canvasWidth, canvasHeight);
            const data = imageData.data;
            let transparent = 0;
            const total = data.length / 4;
            for (let i = 3; i < data.length; i += 4) { if (data[i] < 128) transparent++; }
            revealPercent = transparent / total;
            if (revealPercent > 0.40) {
                isRevealed = true;
                fadeOutOverlay(() => {
                    playRevealSound();
                    const msgEl = document.getElementById('revealedMessage');
                    if (msgEl) msgEl.classList.add('show');
                    canvas.style.pointerEvents = 'none';
                });
            }
        }

        function fadeOutOverlay(callback) {
            let opacity = 1;
            const step = () => {
                opacity -= 0.1;
                if (opacity > 0) {
                    ctx.fillStyle = `rgba(74, 63, 56, ${opacity})`;
                    ctx.fillRect(0, 0, canvasWidth, canvasHeight);
                    requestAnimationFrame(step);
                } else {
                    if (callback) callback();
                }
            };
            step();
        }

        // ── START ──
        navigate('home');
    </script>
</body>
</html>
